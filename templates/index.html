<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PAN Tampering Detection</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #1e3c72, #2a5298);
            min-height: 100vh;
        }

        .upload-box {
            border: 2px dashed #ccc;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: white;
            border-radius: 12px;
        }

        .upload-box:hover {
            border-color: #2a5298;
        }

        .preview-img {
            max-height: 150px;
            margin-top: 15px;
        }

        .card {
            border-radius: 15px;
        }
    </style>
</head>

<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card shadow-lg p-4">
                <h2 class="text-center mb-4">PAN Card Tampering Detection</h2>

                <form id="uploadForm" action="/compare" method="post" enctype="multipart/form-data">

                    <!-- Original -->
                    <div class="mb-4">
                        <label class="form-label">Original PAN Card</label>
                        <div class="upload-box" onclick="document.getElementById('original').click()">
                            Drag & Drop or Click to Upload
                            <input type="file" name="original" id="original" hidden required>
                            <img id="originalPreview" class="preview-img d-none">
                        </div>
                    </div>

                    <!-- Tampered -->
                    <div class="mb-4">
                        <label class="form-label">Tampered PAN Card</label>
                        <div class="upload-box" onclick="document.getElementById('tampered').click()">
                            Drag & Drop or Click to Upload
                            <input type="file" name="tampered" id="tampered" hidden required>
                            <img id="tamperedPreview" class="preview-img d-none">
                        </div>
                    </div>

                    <!-- Progress -->
                    <div class="progress mb-3 d-none" id="progressContainer">
                        <div class="progress-bar progress-bar-striped progress-bar-animated"
                             role="progressbar" style="width: 0%" id="progressBar">
                            0%
                        </div>
                    </div>

                    <button class="btn btn-primary w-100">Analyze</button>

                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function previewImage(input, previewId) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById(previewId);
                preview.src = e.target.result;
                preview.classList.remove("d-none");
            }
            reader.readAsDataURL(file);
        }
    }

    document.getElementById("original").addEventListener("change", function() {
        previewImage(this, "originalPreview");
    });

    document.getElementById("tampered").addEventListener("change", function() {
        previewImage(this, "tamperedPreview");
    });

    // Progress Bar
    document.getElementById("uploadForm").addEventListener("submit", function() {
        const progressContainer = document.getElementById("progressContainer");
        const progressBar = document.getElementById("progressBar");

        progressContainer.classList.remove("d-none");

        let width = 0;
        let interval = setInterval(function() {
            if (width >= 90) {
                clearInterval(interval);
            } else {
                width += 10;
                progressBar.style.width = width + "%";
                progressBar.innerText = width + "%";
            }
        }, 200);
    });
</script>

</body>
</html>
